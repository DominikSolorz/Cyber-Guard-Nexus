service: document-manager-ai

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: document-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: document_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: document-manager-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Backend (FastAPI)
  backend:
    build: ./backend
    container_name: document-manager-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/document_manager
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    restart: unless-stopped

  # Frontend (React + Vite)
  frontend:
    build: ./frontend
    container_name: document-manager-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
